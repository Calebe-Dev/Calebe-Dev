name: SvelteKit Build & Verification

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run SvelteKit Checks (Type checking & Linting)
        run: npm run check
        
      - name: Build Application
        run: npm run build
        
      - name: Deploy via SCP para HestiaCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "147.93.38.91"
          port: 65002
          username: "u623083914"
          password: ${{ secrets.HOST_PASSWORD }}
          source: "build/*"
          target: "/home/u623083914/web/SEU_DOMINIO_AQUI/public_html/"
          strip_components: 1

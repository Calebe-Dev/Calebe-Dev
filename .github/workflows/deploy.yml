name: SvelteKit Build & Verification

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run SvelteKit Checks (Type checking & Linting)
        run: npm run check
        
      - name: Build Application
        run: npm run build
        
      # (Opcional) Guardar output do build para inspecionar no GitHub ou deploys manuais
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sveltekit-build-layer
          path: build/  # Ajuste para .svelte-kit dependendo do seu Svelte Adapter

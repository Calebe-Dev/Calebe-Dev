name: CI/CD - Build & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # Job de CI - roda sempre (push e PR)
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run SvelteKit Checks (Type checking & Linting)
        run: npm run check
        
      - name: Build Application
        run: npm run build
        
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 7

  # Job de CD - roda apenas em push para main/master
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    environment:
      name: production
      url: https://calebearaujo.com.br
    
    env:
      HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
      HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
      HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
      SSH_KEY_PATH: ~/.ssh/hostinger_deploy
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/
      
      - name: Prepare SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_deploy
          chmod 600 ~/.ssh/hostinger_deploy
          
          # Configurar known_hosts se disponível
          if [ -n "${{ secrets.HOSTINGER_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.HOSTINGER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          elif [ -f hostinger_known_hosts ]; then
            cp hostinger_known_hosts ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          fi
      
      - name: Deploy via Script
        run: bash ./scripts/deploy.sh
